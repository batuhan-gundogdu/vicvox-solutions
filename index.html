<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VicVox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root {
    --bg: #0b1020; --panel: #131a2e; --line: #223052;
    --ink: #e8edf7; --muted: #93a1bd; --accent: #5aa9ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; }
  header h1 {
    margin: 0; font-size: 46px; letter-spacing: .5px;
    font-family: "Space Grotesk", -apple-system, sans-serif; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), #9d7bff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin: 16px 0; }
  .panel h2 { font-size: 15px; font-weight: 600; color: var(--muted); margin: 8px 12px; }
  footer { color: var(--muted); font-size: 12.5px; margin-top: 28px; border-top: 1px solid var(--line); padding-top: 14px; }

  /* Zillow-style dual-handle date range */
  .rangebar { padding: 6px 18px 14px; }
  .rangebar .dates { display: flex; justify-content: space-between; color: var(--ink); font-size: 13.5px; margin-bottom: 6px; }
  .rangebar .dates b { color: var(--accent); font-weight: 600; }
  .slider { position: relative; height: 28px; }
  .slider .track, .slider .fill {
    position: absolute; top: 12px; height: 4px; border-radius: 2px; width: 100%;
  }
  .slider .track { background: #25314f; }
  .slider .fill { background: linear-gradient(90deg, var(--accent), #9d7bff); }
  .slider input[type=range] {
    position: absolute; width: 100%; top: 0; height: 28px; margin: 0;
    -webkit-appearance: none; appearance: none; background: none; pointer-events: none;
  }
  .slider input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; pointer-events: auto;
    width: 18px; height: 18px; border-radius: 50%; cursor: grab;
    background: #e8edf7; border: 3px solid var(--accent); margin-top: 5px;
  }
  .slider input[type=range]::-moz-range-thumb {
    pointer-events: auto; width: 14px; height: 14px; border-radius: 50%;
    cursor: grab; background: #e8edf7; border: 3px solid var(--accent);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>VicVox</h1>
  </header>

  <div class="panel">
    <h2>Where the conversation is happening</h2>
    <div class="rangebar">
      <div class="dates"><span>From <b id="d-lo">—</b></span><span>To <b id="d-hi">—</b></span></div>
      <div class="slider">
        <div class="track"></div><div class="fill" id="fill"></div>
        <input type="range" id="r-lo" min="0" max="0" value="0" step="1">
        <input type="range" id="r-hi" min="0" max="0" value="0" step="1">
      </div>
    </div>
    <div id="map" style="height:520px"></div>
  </div>

  <div class="panel"><h2>Comment volume over time</h2><div id="timeline" style="height:320px"></div></div>

  <footer id="foot"></footer>
</div>

<script>
const LAYOUT = {
  paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
  font: { color: "#93a1bd", size: 12 },
  margin: { t: 10, r: 16, b: 40, l: 56 },
};
const CONFIG = { displayModeBar: false, responsive: true };
const fmt = n => n.toLocaleString("en-US");
const pretty = iso => new Date(iso + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

Promise.all([
  fetch("data.json").then(r => r.json()),
  fetch("states.geojson").then(r => r.json()).catch(() => null),
]).then(([d, statesGeo]) => {
  // ---- spatial heat with date-range filter ----
  const dates = [...new Set(
    d.heat.map(h => h.date).concat((d.state_heat || []).map(h => h.date)))].sort();
  const lo = document.getElementById("r-lo"), hi = document.getElementById("r-hi");
  lo.max = hi.max = Math.max(dates.length - 1, 0);
  hi.value = Math.max(dates.length - 1, 0);

  const center = d.heat.length ? {
    lat: d.heat.reduce((a, h) => a + h.lat * h.weight, 0) / d.heat.reduce((a, h) => a + h.weight, 0),
    lon: d.heat.reduce((a, h) => a + h.lon * h.weight, 0) / d.heat.reduce((a, h) => a + h.weight, 0),
  } : { lat: 39.5, lon: -98.4 };

  // KDE-style density field with a *geographic* bandwidth: each location
  // contributes a Gaussian kernel (sigma in miles) stamped onto a fine
  // lat/lon grid. Where kernels coincide they sum — the field gets hotter —
  // and because cells are geographic, the surface scales with the map.
  const SIGMA_MILES = 9, CELL_MILES = 1.6, CUTOFF = 0.04;
  const KDE_SCALE = [
    [0, "rgba(90,169,255,.16)"], [.3, "rgba(90,169,255,.42)"],
    [.55, "rgba(157,123,255,.55)"], [.8, "rgba(255,180,84,.66)"],
    [1, "rgba(255,90,60,.8)"],
  ];

  function kdeField(locs) {
    const lat0 = locs.reduce((s, p) => s + p.lat, 0) / locs.length;
    const miPerLat = 69.0;
    const miPerLon = 69.172 * Math.cos(lat0 * Math.PI / 180);
    const ch = CELL_MILES / miPerLat, cw = CELL_MILES / miPerLon; // cell, deg
    const reach = Math.ceil(3 * SIGMA_MILES / CELL_MILES);
    const grid = new Map();
    for (const p of locs) {
      const ci = Math.round(p.lon / cw), cj = Math.round(p.lat / ch);
      for (let i = ci - reach; i <= ci + reach; i++) {
        for (let j = cj - reach; j <= cj + reach; j++) {
          const dx = (i * cw - p.lon) * miPerLon, dy = (j * ch - p.lat) * miPerLat;
          const k = Math.exp(-(dx * dx + dy * dy) / (2 * SIGMA_MILES * SIGMA_MILES));
          if (k < 1e-3) continue;
          const key = i + "," + j;
          grid.set(key, (grid.get(key) || 0) + p.w * k);
        }
      }
    }
    const maxD = Math.max(...grid.values(), 1e-9);
    const features = [], z = [];
    let n = 0;
    for (const [key, v] of grid) {
      if (v < CUTOFF * maxD) continue;
      const [i, j] = key.split(",").map(Number);
      const x0 = (i - .5) * cw, x1 = (i + .5) * cw;
      const y0 = (j - .5) * ch, y1 = (j + .5) * ch;
      features.push({
        type: "Feature", id: String(n++),
        geometry: { type: "Polygon",
                    coordinates: [[[x0, y0], [x1, y0], [x1, y1], [x0, y1], [x0, y0]]] },
      });
      z.push(v);
    }
    return { features, z, maxD };
  }

  function drawMap() {
    const a = Math.min(+lo.value, +hi.value), b = Math.max(+lo.value, +hi.value);
    document.getElementById("d-lo").textContent = dates.length ? pretty(dates[a]) : "—";
    document.getElementById("d-hi").textContent = dates.length ? pretty(dates[b]) : "—";
    const f = document.getElementById("fill");
    f.style.left = (100 * a / Math.max(+lo.max, 1)) + "%";
    f.style.width = (100 * (b - a) / Math.max(+lo.max, 1)) + "%";
    const inWin = h => h.date >= dates[a] && h.date <= dates[b];

    // Sum window weights per anchor ZIP
    const byZip = new Map();
    for (const h of d.heat.filter(inWin)) {
      const cur = byZip.get(h.zip) || { zip: h.zip, lat: h.lat, lon: h.lon, w: 0 };
      cur.w += h.weight;
      byZip.set(h.zip, cur);
    }
    const locs = [...byZip.values()];
    const maxW = Math.max(...locs.map(p => p.w), 1);
    const traces = [];

    // Statewide wash: zero-anchor-ZIP communities (r/arizona, ...) paint the
    // whole state, faintly, under the local layer
    const byState = new Map();
    for (const h of (d.state_heat || []).filter(inWin)) {
      byState.set(h.state, (byState.get(h.state) || 0) + h.weight);
    }
    if (statesGeo && byState.size) {
      const states = [...byState.keys()];
      const maxS = Math.max(...byState.values(), 1);
      traces.push({
        type: "choroplethmap", geojson: statesGeo, locations: states,
        z: states.map(s => byState.get(s)), zmin: 0, zmax: maxS,
        colorscale: [[0, "rgba(90,169,255,.10)"], [1, "rgba(90,169,255,.28)"]],
        marker: { line: { color: "rgba(90,169,255,.30)", width: 1 } },
        hoverinfo: "skip", showscale: false,
      });
    }

    if (locs.length) {
      const { features, z, maxD } = kdeField(locs);
      traces.push({
        type: "choroplethmap",
        geojson: { type: "FeatureCollection", features },
        locations: features.map(f2 => f2.id),
        z, zmin: 0, zmax: maxD,
        colorscale: KDE_SCALE,
        marker: { line: { width: 0 } },
        hoverinfo: "skip", showscale: false,
      });
    }

    Plotly.react("map", traces, {
      ...LAYOUT, margin: { t: 0, r: 0, b: 0, l: 0 },
      map: { style: "carto-darkmatter", center, zoom: 5.6 },
    }, CONFIG);
  }
  lo.oninput = hi.oninput = drawMap;
  drawMap();

  // ---- timeline ----
  const states = [...new Set(d.daily.map(r => r.state))];
  Plotly.newPlot("timeline", states.map((st, i) => {
    const rows = d.daily.filter(r => r.state === st);
    return { type: "bar", name: st, x: rows.map(r => r.date), y: rows.map(r => r.comments),
             marker: { color: ["#5aa9ff", "#9d7bff", "#ffb454", "#54d6a8"][i % 4] } };
  }), { ...LAYOUT, barmode: "stack", xaxis: { gridcolor: "#1a2440" },
        yaxis: { gridcolor: "#1a2440", title: { text: "comments" } },
        legend: { orientation: "h", y: 1.12 } }, CONFIG);

  const t = d.totals;
  document.getElementById("foot").textContent =
    `${fmt(t.comments)} comments across ${fmt(t.communities)} communities (${t.states.join(", ")}). ` +
    `Aggregated public-discourse metrics only — no individual-level data is published. ` +
    `Generated ${d.generated_at} by the VicVox pipeline.`;
});
</script>
</body>
</html>
